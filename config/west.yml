manifest:
  remotes:
    - name: zmkfirmware
      url-base: https://github.com/zmkfirmware
    - name: badjeff
      url-base: https://github.com/badjeff
    - name: hsgw
      url-base: https://github.com/hsgw
    - name: caksoylar  # <-- led
      url-base: https://github.com/caksoylar
    - name: zettaface
      url-base: https://github.com/zettaface
    - name: oleksandrmaslov
      url-base: https://github.com/oleksandrmaslov
    - name: s-hiraoku
      url-base: https://github.com/s-hiraoku

  projects:
    # ZMK 本体。公式の app/west.yml を取り込む
    - name: zmk
      remote: zmkfirmware
      revision: v0.3
      import: app/west.yml

    # 再現性のため、ブランチ追従だった外部モジュールはコミット SHA に固定
    # (2026-07-04 時点)。更新したい時は SHA を手動で進める。

    # PMW3610 ドライバ（外部モジュール）。元: zmk-0.3 ブランチ
    - name: zmk-pmw3610-driver
      remote: badjeff
      revision: 5c5af40de4d8cdf55dc63c4c5907af1e52da6a95

    # Sensor-rotation。元: main ブランチ
    - name: zmk-feature-sensor_rotation
      remote: hsgw
      revision: e1a0186220ade99220d04dadf9735b758cfdf086

    # LED
    - name: zmk-rgbled-widget  # <-- led
      remote: caksoylar
      revision: v0.3

    # Trackball keybind processor
    # フォーク: wait-ms の k_sleep がシステムワークキューを 600-700ms
    # ブロックする問題を deferred work 化で修正 (non-blocking-wait ブランチ)
    - name: zmk-input-processor-keybind
      remote: s-hiraoku
      revision: a7c64b4570ebdc476e83dbea0d3a16ec89e52af3

    # Trackball acceleration。元: main ブランチ
    - name: zmk-pointing-acceleration
      remote: oleksandrmaslov
      revision: 0da8f97f8f2abb18fcc9d488b25357511922cf32
      
  self:
    path: config
